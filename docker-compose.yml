services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/hiring_agent.db
    volumes:
      - db_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: python worker.py
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/hiring_agent.db
    volumes:
      - db_data:/data
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
